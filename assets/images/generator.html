<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hermes SaaS Banner Generator</title>
  <style>
    body {
      background: #060911;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      overflow: hidden;
    }
    button {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #38BDF8, #6366F1);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
      transition: all 0.2s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(56, 189, 248, 0.6);
    }
    svg {
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <button onclick="exportToPNG()">⬇️ Export High-Res PNG</button>
    
    <!-- 1280x640 SaaS Product Presentation Matrix -->
    <svg id="saas-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
      <defs>
        <!-- Background Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03"/>
        </pattern>
        
        <!-- UI Gradients -->
        <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="100%" stop-color="#CBD5E1"/>
        </linearGradient>
        
        <linearGradient id="pipeline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6366F1"/>
          <stop offset="50%" stop-color="#38BDF8"/>
          <stop offset="100%" stop-color="#34D399"/>
        </linearGradient>
        
        <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1E293B" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#0F172A" stop-opacity="0.85"/>
        </linearGradient>

        <!-- Stronger Ambient Glow Filter for Telegram & Notion -->
        <filter id="blur-glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="20" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      <!-- Background Layer -->
      <rect width="1280" height="640" fill="#070A13"/>
      <rect width="1280" height="640" fill="url(#grid)"/>
      
      <!-- High-Brightness Glow Backlights (Amplified around targets) -->
      <circle cx="340" cy="410" r="100" fill="#6366F1" opacity="0.1" filter="url(#blur-glow)"/>
      <circle cx="795" cy="410" r="150" fill="#38BDF8" opacity="0.22" filter="url(#blur-glow)"/> <!-- Brightened Telegram Glow -->
      <circle cx="1115" cy="410" r="140" fill="#F59E0B" opacity="0.18" filter="url(#blur-glow)"/> <!-- Brightened Notion Glow -->

      <!-- HEADER TYPOGRAPHY -->
      <g transform="translate(640, 90)" text-anchor="middle">
        <!-- Subtitle Badge -->
        <rect x="-115" y="0" width="230" height="26" rx="13" fill="#1E1B4B" stroke="#4338CA" stroke-width="1"/>
        <text y="17" fill="#A5B4FC" font-size="11" font-weight="600" letter-spacing="1.5" font-family="sans-serif">HERMES AUTOMATION EXAMPLES</text>
        
        <!-- Headline with AI Agents extension -->
        <text y="75" fill="url(#text-grad)" font-size="38" font-weight="800" letter-spacing="-0.5" font-family="sans-serif">Build Automated Digital Businesses with AI Agents</text>
        
        <!-- Tech Stack Breadcrumb -->
        <text y="115" fill="#475569" font-size="15" font-weight="500" font-family="sans-serif">Payhip  ✦  Make  ✦  Telegram  ✦  Notion</text>
      </g>

      <!-- DATA HUB PIPELINES -->
      <g opacity="0.7">
        <path d="M 230 410 L 410 410 M 590 410 L 690 410 M 870 410 L 1050 410" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 4"/>
        <path d="M 410 410 L 690 410" fill="none" stroke="url(#pipeline-grad)" stroke-width="3" filter="url(#blur-glow)" opacity="0.5"/>
        <polygon points="405,405 415,410 405,415" fill="#475569"/>
        <polygon points="685,405 695,410 685,415" fill="#38BDF8"/>
        <polygon points="1045,405 1055,410 1045,415" fill="#475569"/>
      </g>

      <!-- TECH LAYERS Matrix (Pure English) -->
      
      <!-- NODE 01: PAYHIP -->
      <g transform="translate(70, 290)">
        <rect width="170" height="210" rx="14" fill="url(#card-bg)" stroke="#334155" stroke-width="1.5"/>
        <rect x="24" y="24" width="36" height="36" rx="8" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-width="1.5"/>
        <circle cx="42" cy="42" r="6" fill="#EC4899"/>
        <text x="24" y="95" fill="#475569" font-size="11" font-weight="600" letter-spacing="1" font-family="sans-serif">TRIGGER</text>
        <text x="24" y="122" fill="#F8FAFC" font-size="22" font-weight="700" font-family="sans-serif">Payhip</text>
        <text x="24" y="152" fill="#475569" font-size="13" font-weight="400" font-family="sans-serif">
          <tspan x="24" dy="0">Instant Checkout</tspan>
          <tspan x="24" dy="18">Webhook Ingestion</tspan>
        </text>
      </g>

      <!-- NODE 02: MAKE -->
      <g transform="translate(390, 265)">
        <rect width="210" height="240" rx="18" fill="url(#card-bg)" stroke="#334155" stroke-width="1.5"/>
        <rect x="24" y="24" width="44" height="44" rx="10" fill="#6366F1" fill-opacity="0.15" stroke="#475569" stroke-width="1.5"/>
        <path d="M 40 46 L 52 46 M 46 40 L 46 52" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>
        <text x="24" y="100" fill="#6366F1" font-size="11" font-weight="700" letter-spacing="1" font-family="sans-serif">LOGIC ENGINE</text>
        <text x="24" y="130" fill="#FFFFFF" font-size="26" font-weight="800" font-family="sans-serif">Make</text>
        <text x="24" y="165" fill="#475569" font-size="14" font-weight="400" font-family="sans-serif">
          <tspan x="24" dy="0">Workflow Routing</tspan>
          <tspan x="24" dy="20">Automation Node</tspan>
        </text>
        <circle cx="32" cy="212" r="3.5" fill="#34D399"/>
        <text x="42" y="215" fill="#34D399" font-size="11" font-weight="600" font-family="sans-serif">Active Blueprints</text>
      </g>

      <!-- NODE 03: TELEGRAM (High Brightness Highlight) -->
      <g transform="translate(710, 290)">
        <rect width="170" height="210" rx="14" fill="url(#card-bg)" stroke="#38BDF8" stroke-width="2"/> <!-- Thicker & Brighter Border -->
        <rect x="24" y="24" width="36" height="36" rx="8" fill="#38BDF8" fill-opacity="0.25" stroke="#38BDF8" stroke-width="2"/>
        <path d="M 34 44 L 48 36 L 44 49 Z" fill="none" stroke="#38BDF8" stroke-width="1.5"/>
        <text x="24" y="95" fill="#38BDF8" font-size="11" font-weight="700" letter-spacing="1" font-family="sans-serif">INTERFACE</text>
        <text x="24" y="122" fill="#FFFFFF" font-size="22" font-weight="700" font-family="sans-serif">Telegram</text>
        
        <!-- High Contrast Bright English Description -->
        <text x="24" y="152" font-size="13" font-family="sans-serif">
          <tspan x="24" dy="0" fill="#FFFFFF" font-weight="700">Hermes AI Bot</tspan>
          <tspan x="24" dy="18" fill="#E2E8F0" font-weight="500">Routing &amp; Actions</tspan>
        </text>
      </g>

      <!-- NODE 04: NOTION (High Brightness Highlight) -->
      <g transform="translate(1030, 290)">
        <rect width="170" height="210" rx="14" fill="url(#card-bg)" stroke="#F59E0B" stroke-width="2"/> <!-- Thicker & Brighter Border -->
        <rect x="24" y="24" width="36" height="36" rx="8" fill="#F59E0B" fill-opacity="0.25" stroke="#F59E0B" stroke-width="2"/>
        <rect x="33" y="33" width="18" height="18" fill="none" stroke="#F59E0B" stroke-width="2"/>
        <text x="24" y="95" fill="#F59E0B" font-size="11" font-weight="700" letter-spacing="1" font-family="sans-serif">DATA STORE</text>
        <text x="24" y="122" fill="#FFFFFF" font-size="22" font-weight="700" font-family="sans-serif">Notion</text>
        
        <!-- High Contrast Bright English Description -->
        <text x="24" y="152" font-size="13" font-family="sans-serif">
          <tspan x="24" dy="0" fill="#FFFFFF" font-weight="700">Central CRM</tspan>
          <tspan x="24" dy="18" fill="#E2E8F0" font-weight="500">Data &amp; State Matrix</tspan>
        </text>
      </g>
    </svg>
  </div>

  <script>
    function exportToPNG() {
      const svgElement = document.getElementById('saas-svg');
      const svgString = new XMLSerializer().serializeToString(svgElement);
      
      const canvas = document.createElement('canvas');
      canvas.width = 1280;
      canvas.height = 640;
      const context = canvas.getContext('2d');
      
      const image = new Image();
      const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
      const blobURL = URL.createObjectURL(svgBlob);
      
      image.onload = function() {
        context.drawImage(image, 0, 0);
        const pngURL = canvas.toDataURL('image/png');
        
        const downloadLink = document.createElement('a');
        downloadLink.href = pngURL;
        downloadLink.download = 'hermes-ai-automation-banner.png';
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        URL.revokeObjectURL(blobURL);
      };
      
      image.src = blobURL;
    }
  </script>
</body>
</html>
